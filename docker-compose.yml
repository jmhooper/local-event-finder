services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: app
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: local_event_aggregator
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - backend
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d local_event_aggregator"]
      interval: 5s
      timeout: 5s
      retries: 10

  local-event-aggregator:
    build: ./local-event-aggregator
    container_name: local-event-aggregator
    init: true
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://app:${POSTGRES_PASSWORD}@postgres:5432/local_event_aggregator
      LITELLM_API_HOST: ${LITELLM_API_HOST}
      LITELLM_API_KEY: ${LITELLM_API_KEY}
      PORT: "3000"
      SCHEDULE_TZ: America/New_York
    networks:
      - backend
    extra_hosts:
      - "litellm.lan:192.168.0.60"

  local-event-ui:
    build: ./local-event-ui
    container_name: local-event-ui
    depends_on:
      - local-event-aggregator
    ports:
      - "8080:80"
    environment:
      EVENTS_API_URL: "http://local-event-aggregator:3000"
    networks:
      - backend

networks:
  backend:

volumes:
  postgres_data:
